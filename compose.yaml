services:
  nats-jetstream:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "127.0.0.1:4222:4222"
    volumes:
      - nats_data:/data

  ingress-api:
    build: .
    restart: unless-stopped
    labels:
      org.opencontainers.image.revision: ${RAG_INGRESS_SOURCE_REVISION:-local}
      com.local.rag-ingress-queue.runtime: ubuntu-smoke
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: api
      RAG_INGRESS_NATS_URL: nats://nats-jetstream:4222
      RAGFLOW_DELIVERY_ENABLED: ${RAGFLOW_DELIVERY_ENABLED:-false}
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
      RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID: ${RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID:-}
      RAGFLOW_SESSION_MEMORY_DATASET_ID: ${RAGFLOW_SESSION_MEMORY_DATASET_ID:-}
      RAGFLOW_SESSION_SUMMARY_DATASET_ID: ${RAGFLOW_SESSION_SUMMARY_DATASET_ID:-}
      RAGFLOW_PROJECT_MEMORY_DATASET_ID: ${RAGFLOW_PROJECT_MEMORY_DATASET_ID:-}
      RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID: ${RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID:-}
      RAGFLOW_PRESSURE_RUNNING_THROTTLE_THRESHOLD: ${RAGFLOW_PRESSURE_RUNNING_THROTTLE_THRESHOLD:-20}
      RAGFLOW_PRESSURE_UNSTART_THROTTLE_THRESHOLD: ${RAGFLOW_PRESSURE_UNSTART_THROTTLE_THRESHOLD:-5}
      RAGFLOW_PRESSURE_RUNNING_CLOSED_THRESHOLD: ${RAGFLOW_PRESSURE_RUNNING_CLOSED_THRESHOLD:-100}
      RAGFLOW_PRESSURE_UNSTART_CLOSED_THRESHOLD: ${RAGFLOW_PRESSURE_UNSTART_CLOSED_THRESHOLD:-25}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nats-jetstream

  ingress-worker:
    # G2: Java worker retired — replaced by the Python live worker on RAG_INGRESS_QUEUE
    # (agent-knowledge compose project rag-ingress-live). Profile-gated so "compose up"
    # will NOT recreate it (WorkQueue forbids a second consumer). Roll back: drop profile.
    profiles: ["retired"]
    build: .
    restart: unless-stopped
    labels:
      org.opencontainers.image.revision: ${RAG_INGRESS_SOURCE_REVISION:-local}
      com.local.rag-ingress-queue.runtime: ubuntu-smoke
    healthcheck:
      test: ["CMD-SHELL", "grep -q rag-ingress-queue.jar /proc/1/cmdline"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      SPRING_PROFILES_ACTIVE: worker
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      RAG_INGRESS_NATS_URL: nats://nats-jetstream:4222
      RAGFLOW_DELIVERY_ENABLED: ${RAGFLOW_DELIVERY_ENABLED:-false}
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
      RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID: ${RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID:-}
      RAGFLOW_SESSION_MEMORY_DATASET_ID: ${RAGFLOW_SESSION_MEMORY_DATASET_ID:-}
      RAGFLOW_SESSION_SUMMARY_DATASET_ID: ${RAGFLOW_SESSION_SUMMARY_DATASET_ID:-}
      RAGFLOW_PROJECT_MEMORY_DATASET_ID: ${RAGFLOW_PROJECT_MEMORY_DATASET_ID:-}
      RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID: ${RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID:-}
      RAGFLOW_PRESSURE_RUNNING_THROTTLE_THRESHOLD: ${RAGFLOW_PRESSURE_RUNNING_THROTTLE_THRESHOLD:-20}
      RAGFLOW_PRESSURE_UNSTART_THROTTLE_THRESHOLD: ${RAGFLOW_PRESSURE_UNSTART_THROTTLE_THRESHOLD:-5}
      RAGFLOW_PRESSURE_RUNNING_CLOSED_THRESHOLD: ${RAGFLOW_PRESSURE_RUNNING_CLOSED_THRESHOLD:-100}
      RAGFLOW_PRESSURE_UNSTART_CLOSED_THRESHOLD: ${RAGFLOW_PRESSURE_UNSTART_CLOSED_THRESHOLD:-25}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nats-jetstream

  ingress-worker-py:
    # G2 live delivery worker, co-located (Python). Replaces the retired Java
    # ingress-worker above. Consumes the live RAG_INGRESS_QUEUE WorkQueue and
    # delivers to RAGFlow. WorkQueue allows ONE consumer of this durable — do not
    # run this alongside another consumer of rag_target_delivery_worker (e.g. a
    # separate live compose project). Live re-deploy is a separate goal.
    build: ./worker
    restart: unless-stopped
    labels:
      org.opencontainers.image.revision: ${RAG_INGRESS_SOURCE_REVISION:-local}
      com.local.rag-ingress-queue.runtime: ubuntu-smoke
    environment:
      RAG_INGRESS_NATS_URL: nats://nats-jetstream:4222
      # Live consume/deliver is OPT-IN so a bare `compose up` (this file is the
      # ubuntu-smoke project) stays safe: it defaults to the isolated shadow
      # stream with delivery off and never takes over the live WorkQueue durable.
      # The live deployment supplies these via its env-file:
      #   RAG_INGRESS_STREAM=RAG_INGRESS_QUEUE  RAG_INGRESS_SUBJECT=rag.ingress.>
      #   RAG_INGRESS_DURABLE=rag_target_delivery_worker
      #   RAG_INGRESS_ALLOW_LIVE_QUEUE=1  RAG_INGRESS_DELIVER=1
      SHADOW_STREAM: ${RAG_INGRESS_STREAM:-RAG_INGRESS_SHADOW}
      SHADOW_SUBJECT: ${RAG_INGRESS_SUBJECT:-rag.shadow.>}
      SHADOW_DURABLE: ${RAG_INGRESS_DURABLE:-shadow_python_worker}
      ALLOW_LIVE_QUEUE: ${RAG_INGRESS_ALLOW_LIVE_QUEUE:-0}
      SHADOW_DELIVER: ${RAG_INGRESS_DELIVER:-0}
      # High = ack-drop effectively disabled: a failing message NAKs and is
      # retried/preserved rather than silently dropped (favours data preservation).
      MAX_DELIVER: ${RAG_INGRESS_MAX_DELIVER:-100000}
      WORKER_FETCH_BATCH: ${RAG_INGRESS_WORKER_FETCH_BATCH:-1}
      WORKER_CONCURRENCY: ${RAG_INGRESS_WORKER_CONCURRENCY:-1}
      NATURAL_KEY_BROAD_SCAN_PAGES: ${RAG_INGRESS_NATURAL_KEY_BROAD_SCAN_PAGES:-0}
      INGEST_STATE_DB_PATH: /var/lib/agent-knowledge/ingest-state/ingest-state.sqlite
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}
      # Reuse the ingress-api's own pressure verdict (single source, fail-open).
      RAG_INGRESS_PRESSURE_URL: ${RAG_INGRESS_PRESSURE_URL:-http://ingress-api:8080/status}
      # Per-profile routing via env_profile_dataset_resolver — all 7 target
      # profiles (parity with TargetProfileRegistry; task-summary +
      # approved-memory-card were missing from the prior 5-env live worker).
      RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID: ${RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID:-}
      RAGFLOW_SESSION_MEMORY_DATASET_ID: ${RAGFLOW_SESSION_MEMORY_DATASET_ID:-}
      RAGFLOW_SESSION_SUMMARY_DATASET_ID: ${RAGFLOW_SESSION_SUMMARY_DATASET_ID:-}
      RAGFLOW_PROJECT_MEMORY_DATASET_ID: ${RAGFLOW_PROJECT_MEMORY_DATASET_ID:-}
      RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID: ${RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID:-}
      RAGFLOW_TASK_SUMMARY_DATASET_ID: ${RAGFLOW_TASK_SUMMARY_DATASET_ID:-}
      RAGFLOW_APPROVED_MEMORY_CARD_DATASET_ID: ${RAGFLOW_APPROVED_MEMORY_CARD_DATASET_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    volumes:
      - rag-ingress-live-state:/var/lib/agent-knowledge/ingest-state
    depends_on:
      - nats-jetstream
      - ingress-api

  llm-brain-neo4j:
    profiles: ["llm-brain-graph"]
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${LLM_BRAIN_NEO4J_AUTH:-neo4j/llmbrain}
      NEO4J_server_memory_heap_initial__size: ${LLM_BRAIN_NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${LLM_BRAIN_NEO4J_HEAP_MAX:-1g}
      NEO4J_server_memory_pagecache_size: ${LLM_BRAIN_NEO4J_PAGECACHE:-512m}
      NEO4J_dbms_security_procedures_unrestricted: ${LLM_BRAIN_NEO4J_UNRESTRICTED_PROCEDURES:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${LLM_BRAIN_NEO4J_HTTP_PORT:-17474}:7474"
      - "127.0.0.1:${LLM_BRAIN_NEO4J_BOLT_PORT:-17687}:7687"
    volumes:
      - llm-brain-neo4j-data:/data
      - llm-brain-neo4j-logs:/logs

volumes:
  nats_data:
  rag-ingress-live-state:
  llm-brain-neo4j-data:
  llm-brain-neo4j-logs:
