services:
  nats-jetstream:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "127.0.0.1:4222:4222"
    volumes:
      - nats_data:/data

  ingress-api:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: api
      RAG_INGRESS_NATS_URL: nats://nats-jetstream:4222
    depends_on:
      - nats-jetstream

  ingress-worker:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: worker
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      RAG_INGRESS_NATS_URL: nats://nats-jetstream:4222
    depends_on:
      - nats-jetstream

volumes:
  nats_data:
