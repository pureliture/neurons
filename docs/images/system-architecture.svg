<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c142b"/>
      <stop offset="1" stop-color="#070b18"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#14203d" stroke-width="1"/>
    </pattern>
    <marker id="flow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 L3.5 6 Z" fill="#2dd4bf"/>
    </marker>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="700" fill="url(#sky)"/>
  <rect width="1280" height="700" fill="url(#grid)"/>
  <rect x="0" y="0" width="1280" height="4" fill="#2dd4bf"/>

  <!-- header -->
  <text x="56" y="60" fill="#f1f5f9" font-size="32" font-weight="700" letter-spacing="1">시스템 아키텍처</text>
  <text x="58" y="86" fill="#5b6b8c" font-size="13.5">redacted RAG-ready ingest  ›  backpressure-gated delivery  ›  target-neutral adapter boundary</text>

  <!-- pressure legend -->
  <g font-size="11.5" font-weight="600">
    <rect x="940" y="36" width="284" height="40" rx="9" fill="#101a33" stroke="#1f2d4a"/>
    <text x="958" y="61" fill="#5b6b8c" font-size="10.5">PRESSURE</text>
    <circle cx="1028" cy="56" r="6" fill="#34d399"/><text x="1040" y="60" fill="#9fb3d1">OPEN</text>
    <circle cx="1097" cy="56" r="6" fill="#fbbf24"/><text x="1109" y="60" fill="#9fb3d1">THROTTLED</text>
    <circle cx="1185" cy="56" r="6" fill="#f87171"/><text x="1180" y="60" fill="#9fb3d1" text-anchor="end" transform="translate(72,0)">CLOSED</text>
  </g>

  <!-- compose boundaries -->
  <g>
    <rect x="300" y="150" width="708" height="368" rx="16" fill="none" stroke="#2dd4bf" stroke-width="1.4" stroke-dasharray="7 6" opacity="0.55"/>
    <rect x="312" y="138" width="392" height="24" rx="6" fill="#0c142b"/>
    <text x="328" y="155" fill="#2dd4bf" font-size="11.5" font-weight="600">rag-ingress-queue · Docker Compose project</text>

    <rect x="1024" y="150" width="208" height="368" rx="16" fill="none" stroke="#f97316" stroke-width="1.4" stroke-dasharray="7 6" opacity="0.5"/>
    <rect x="1036" y="138" width="196" height="24" rx="6" fill="#0c142b"/>
    <text x="1050" y="155" fill="#fb923c" font-size="11" font-weight="600">RetiredIndexBridge · 수정하지 않음</text>
  </g>

  <!-- connectors -->
  <g fill="none" stroke="#2dd4bf" stroke-width="2" marker-end="url(#flow)">
    <path d="M268 334 H312"/>
    <path d="M500 334 H548"/>
    <path d="M736 334 H784"/>
    <path d="M972 334 H1024"/>
  </g>
  <g font-size="11" fill="#7c8cae" text-anchor="middle">
    <text x="290" y="318">POST /enqueue</text>
    <text x="524" y="318">publish + ack</text>
    <text x="760" y="318">pull consumer</text>
    <text x="998" y="318">deliver()</text>
  </g>

  <!-- PRODUCERS -->
  <text x="56" y="178" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">PRODUCERS</text>
  <g>
    <!-- dendrite: single Mac thin-client producer, two emit surfaces -->
    <rect x="48" y="184" width="228" height="184" rx="13" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-dasharray="6 5" opacity="0.5"/>
    <text x="62" y="201" fill="#a5b4fc" font-size="10.5" font-weight="600">dendrite (Mac thin-client)</text>

    <rect x="64" y="210" width="204" height="68" rx="11" fill="#111b35" stroke="#283a5e"/>
    <rect x="64" y="210" width="4" height="68" rx="2" fill="#818cf8"/>
    <text x="84" y="234" fill="#dbe4f3" font-size="12" font-weight="600">client sessions</text>
    <text x="84" y="253" fill="#6b7da0" font-size="11">codex · claude 세션</text>
    <text x="84" y="269" fill="#6b7da0" font-size="11">conversation_chunk</text>

    <rect x="64" y="288" width="204" height="68" rx="11" fill="#111b35" stroke="#283a5e"/>
    <rect x="64" y="288" width="4" height="68" rx="2" fill="#818cf8"/>
    <text x="84" y="312" fill="#dbe4f3" font-size="12" font-weight="600">session-compactor</text>
    <text x="84" y="331" fill="#6b7da0" font-size="11">transcript packer</text>
    <text x="84" y="347" fill="#6b7da0" font-size="11">document_payload</text>

    <!-- neurons server-side producer, co-located in worker/ -->
    <rect x="56" y="378" width="212" height="78" rx="11" fill="#111b35" stroke="#2a3f4a"/>
    <rect x="56" y="378" width="4" height="78" rx="2" fill="#2dd4bf"/>
    <text x="76" y="402" fill="#dbe4f3" font-size="12.5" font-weight="600">neurons server-side</text>
    <text x="76" y="421" fill="#7c8cae" font-size="10">worker/ · memory-regeneration</text>
    <text x="76" y="437" fill="#6b7da0" font-size="11">session/task/card</text>
    <text x="76" y="451" fill="#5b6b8c" font-size="9.5">out-of-repo loopback enqueue</text>
  </g>
  <g fill="none" stroke="#34406a" stroke-width="1.5">
    <path d="M268 244 C293 244 290 312 312 318"/>
    <path d="M268 322 H312"/>
    <path d="M268 417 C293 417 290 350 312 344"/>
  </g>

  <!-- INGRESS-API -->
  <g>
    <rect x="312" y="222" width="188" height="224" rx="13" fill="#111d3a" stroke="#2dd4bf" stroke-width="1.3"/>
    <rect x="312" y="222" width="188" height="34" rx="13" fill="#15294a"/>
    <rect x="312" y="244" width="188" height="12" fill="#15294a"/>
    <circle cx="332" cy="239" r="5" fill="#2dd4bf"/>
    <text x="346" y="243" fill="#7af0e0" font-size="12.5" font-weight="700">ingress-api</text>
    <text x="328" y="284" fill="#9fb3d1" font-size="11">› IngestJobValidator</text>
    <text x="328" y="306" fill="#9fb3d1" font-size="11">› RedactionGuard</text>
    <text x="328" y="328" fill="#9fb3d1" font-size="11">› IdempotencyStore</text>
    <text x="328" y="350" fill="#9fb3d1" font-size="11">› IngestPublisher</text>
    <line x1="328" y1="366" x2="484" y2="366" stroke="#1f2d4a"/>
    <text x="328" y="390" fill="#5b6b8c" font-size="10">@Profile(api) · 가상 스레드</text>
    <text x="328" y="412" fill="#5b6b8c" font-size="10">202 queued · 400 거부</text>
    <text x="328" y="430" fill="#5b6b8c" font-size="10">503 publish-ack 없음</text>
  </g>

  <!-- NATS -->
  <g>
    <rect x="548" y="222" width="188" height="224" rx="13" fill="#111d3a" stroke="#22d3ee" stroke-width="1.3"/>
    <rect x="548" y="222" width="188" height="34" rx="13" fill="#10324a"/>
    <rect x="548" y="244" width="188" height="12" fill="#10324a"/>
    <circle cx="568" cy="239" r="5" fill="#22d3ee"/>
    <text x="582" y="243" fill="#7fe7f7" font-size="12.5" font-weight="700">NATS JetStream</text>
    <text x="564" y="284" fill="#9fb3d1" font-size="11">stream RAG_INGRESS_QUEUE</text>
    <text x="564" y="306" fill="#9fb3d1" font-size="11">WorkQueuePolicy · file</text>
    <text x="564" y="328" fill="#9fb3d1" font-size="11">durable pull consumer</text>
    <text x="564" y="350" fill="#9fb3d1" font-size="11">explicit ack · max 5</text>
    <line x1="564" y1="366" x2="720" y2="366" stroke="#1f2d4a"/>
    <text x="564" y="390" fill="#5b6b8c" font-size="10">rag.ingress.transcript</text>
    <text x="564" y="408" fill="#5b6b8c" font-size="10">rag.ingress.document</text>
    <text x="564" y="430" fill="#5b6b8c" font-size="10">redelivery · dead-letter</text>
  </g>

  <!-- WORKER -->
  <g>
    <rect x="784" y="222" width="188" height="224" rx="13" fill="#111d3a" stroke="#34d399" stroke-width="1.3"/>
    <rect x="784" y="222" width="188" height="34" rx="13" fill="#123a31"/>
    <rect x="784" y="244" width="188" height="12" fill="#123a31"/>
    <circle cx="804" cy="239" r="5" fill="#34d399"/>
    <text x="818" y="243" fill="#86efc4" font-size="12.5" font-weight="700">ingress-worker-py</text>
    <text x="800" y="284" fill="#9fb3d1" font-size="11">› shadow_worker (Python)</text>
    <text x="800" y="306" fill="#9fb3d1" font-size="11">› pressure gate</text>
    <text x="800" y="328" fill="#9fb3d1" font-size="11">› pull consumer + deliver</text>
    <line x1="800" y1="344" x2="956" y2="344" stroke="#1f2d4a"/>
    <g font-size="10.5">
      <circle cx="806" cy="367" r="5" fill="#34d399"/><text x="818" y="371" fill="#86efc4">OPEN  → deliver</text>
      <circle cx="806" cy="391" r="5" fill="#fbbf24"/><text x="818" y="395" fill="#fcd34d">THROTTLED → hold</text>
      <circle cx="806" cy="415" r="5" fill="#f87171"/><text x="818" y="419" fill="#fca5a5">CLOSED → nak</text>
    </g>
    <text x="800" y="430" fill="#5b6b8c" font-size="10">fail-closed 기본값</text>
    <text x="800" y="442" fill="#6b5563" font-size="8">Java worker 은퇴 (retired)</text>
  </g>

  <!-- port membrane -->
  <g>
    <line x1="1004" y1="232" x2="1004" y2="436" stroke="#f97316" stroke-width="2" stroke-dasharray="3 4"/>
    <rect x="985" y="312" width="38" height="44" rx="7" fill="#1c1426" stroke="#f97316"/>
    <text x="1004" y="330" fill="#fb923c" font-size="9" text-anchor="middle">Rag</text>
    <text x="1004" y="342" fill="#fb923c" font-size="9" text-anchor="middle">Target</text>
    <text x="1004" y="352" fill="#fb923c" font-size="8" text-anchor="middle">Adapter</text>
  </g>

  <!-- RETIRED_INDEX_BRIDGE -->
  <g>
    <rect x="1044" y="222" width="168" height="224" rx="13" fill="#1c1626" stroke="#f97316" stroke-width="1.3"/>
    <rect x="1044" y="222" width="168" height="34" rx="13" fill="#3a2412"/>
    <rect x="1044" y="244" width="168" height="12" fill="#3a2412"/>
    <circle cx="1064" cy="239" r="5" fill="#f97316"/>
    <text x="1078" y="243" fill="#fdba74" font-size="12.5" font-weight="700">RetiredIndexBridge</text>
    <text x="1060" y="278" fill="#9fb3d1" font-size="10">datasets · target-profile 7개 중 일부</text>
    <g font-size="10" fill="#cbb89f">
      <rect x="1060" y="284" width="136" height="20" rx="5" fill="#1c140c" opacity="0.6"/><text x="1070" y="298" fill="#6b5563" text-decoration="line-through">transcript-memory</text><text x="1184" y="298" fill="#6b5563" font-size="8" text-anchor="end">retired</text>
      <rect x="1060" y="308" width="136" height="20" rx="5" fill="#251a10"/><text x="1070" y="322">session-memory</text>
      <rect x="1060" y="332" width="136" height="20" rx="5" fill="#251a10"/><text x="1070" y="346">session-summary</text>
      <rect x="1060" y="356" width="136" height="20" rx="5" fill="#251a10"/><text x="1070" y="370">task-summary</text>
      <rect x="1060" y="380" width="136" height="20" rx="5" fill="#251a10"/><text x="1070" y="394">approved-memory-card</text>
    </g>
    <text x="1060" y="424" fill="#5b6b8c" font-size="9.5">upload › metadata › parse</text>
  </g>

  <!-- bottom strip -->
  <g>
    <rect x="56" y="556" width="1168" height="96" rx="13" fill="#0e1730" stroke="#1f2d4a"/>
    <text x="78" y="586" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">불변 경계</text>
    <line x1="78" y1="596" x2="1202" y2="596" stroke="#1f2d4a"/>
    <g font-size="11">
      <text x="78" y="622" fill="#9fb3d1">◆ Producer는 RAG target을 직접 write하지 않는다 — 모든 write는 queue를 통과</text>
      <text x="78" y="642" fill="#9fb3d1">◆ raw token · dataset_id · document_id · private path · transcript body는 ingress에서 차단</text>
      <text x="652" y="622" fill="#9fb3d1">◆ Core server는 RAG target을 모른다 — RetiredIndexBridge 처리는 adapter에 격리</text>
      <text x="652" y="642" fill="#9fb3d1">◆ indexed ≠ authorized — recall/promote 권한은 external 상태표가 소유</text>
    </g>
  </g>
</svg>
