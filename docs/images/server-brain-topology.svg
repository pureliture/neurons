    <text x="768" y="292" fill="#fbbf24" font-size="10">shadow default · delivery gated</text>
    <text x="768" y="310" fill="#5b6b8c" font-size="10">fail-closed 기본값</text>
  </g>

  <!-- retired java worker note -->
  <g opacity="0.5">
