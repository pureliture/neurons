<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="tsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c142b"/>
      <stop offset="1" stop-color="#070b18"/>
    </linearGradient>
    <pattern id="tgrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#14203d" stroke-width="1"/>
    </pattern>
    <marker id="tflow" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L12 6 L0 12 L3.5 6 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="tflowDim" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
