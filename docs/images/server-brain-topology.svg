    <text x="1024" y="170" fill="#fb923c" font-size="10" font-weight="700" text-anchor="middle">selectable</text>
    <text x="1024" y="183" fill="#fb923c" font-size="10" font-weight="700" text-anchor="middle">backend</text>
    <g>
