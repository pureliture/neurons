  </defs>

  <rect width="1440" height="900" fill="url(#tsky)"/>
  <rect width="1440" height="900" fill="url(#tgrid)"/>
  <rect x="0" y="0" width="1440" height="4" fill="#2dd4bf"/>

  <!-- header -->
  <text x="56" y="58" fill="#f1f5f9" font-size="32" font-weight="700" letter-spacing="1">서버-브레인 토폴로지</text>
  <text x="58" y="84" fill="#5b6b8c" font-size="13.5">plane map — ingress lane · ledger/state-authority · transcript pipeline · brain query · graph-memory · GC safety</text>

  <!-- legend -->
  <g font-size="11">
