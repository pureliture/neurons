      <text x="78" y="286" fill="#64748b" font-size="10">session · cursor</text>
    </g>
    <g>
      <rect x="60" y="306" width="196" height="48" rx="10" fill="#0e1730" stroke="#475569" stroke-width="1.1" stroke-dasharray="5 4"/>
