    <line x1="344" y1="270" x2="492" y2="270" stroke="#1f2d4a"/>
    <text x="344" y="292" fill="#5b6b8c" font-size="10">@Profile(api)</text>
    <text x="344" y="310" fill="#5b6b8c" font-size="10">202 queued · 400 거부</text>
  </g>

  <!-- NATS -->
  <g>
    <rect x="540" y="158" width="180" height="172" rx="13" fill="#111d3a" stroke="#22d3ee" stroke-width="1.3"/>
    <rect x="540" y="158" width="180" height="34" rx="13" fill="#10324a"/>
    <rect x="540" y="180" width="180" height="12" fill="#10324a"/>
    <circle cx="560" cy="175" r="5" fill="#22d3ee"/>
