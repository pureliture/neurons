    <rect x="52" y="138" width="208" height="24" rx="6" fill="#0c142b"/>
    <text x="68" y="155" fill="#94a3b8" font-size="11" font-weight="700">dendrite · out-of-repo / client</text>

    <g>
      <rect x="60" y="178" width="196" height="56" rx="10" fill="#0e1730" stroke="#475569" stroke-width="1.1" stroke-dasharray="5 4"/>
      <rect x="60" y="178" width="4" height="56" rx="2" fill="#818cf8"/>
      <text x="78" y="202" fill="#cbd5e1" font-size="12" font-weight="600">Mac thin-client</text>
      <text x="78" y="222" fill="#64748b" font-size="10">provider hook</text>
    </g>
    <g>
      <rect x="60" y="246" width="196" height="48" rx="10" fill="#0e1730" stroke="#475569" stroke-width="1.1" stroke-dasharray="5 4"/>
