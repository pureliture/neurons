    <text x="1126" y="80" fill="#9fb3d1">solid = live default</text>
    <line x1="1262" y1="76" x2="1296" y2="76" stroke="#475569" stroke-width="2.2" stroke-dasharray="6 5"/>
    <text x="1304" y="80" fill="#9fb3d1" font-size="10.5">dashed = out-of-repo</text>
    <text x="1126" y="98" fill="#64748b" font-size="10">dimmed = gated / off-by-default</text>
  </g>

  <!-- ============================================================= -->
