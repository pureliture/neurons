    <text x="556" y="310" fill="#5b6b8c" font-size="10">redelivery · dead-letter</text>
  </g>

  <!-- worker (python live delivery) -->
  <g>
    <rect x="752" y="158" width="184" height="172" rx="13" fill="#111d3a" stroke="#34d399" stroke-width="1.3"/>
    <rect x="752" y="158" width="184" height="34" rx="13" fill="#123a31"/>
