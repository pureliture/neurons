    </g>
    <path d="M908 600 V612" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#tflow)"/>
    <g>
      <rect x="736" y="616" width="344" height="38" rx="9" fill="#0f1c26" stroke="#1f3a4a"/>
      <text x="752" y="634" fill="#bfe9f2" font-size="11" font-weight="600">builder cron</text>
      <text x="752" y="648" fill="#5b8a98" font-size="9.5">materialize + project · fail-closed</text>
    </g>
    <path d="M908 658 V668" fill="none" stroke="#22d3ee" stroke-width="1.8" marker-end="url(#tflow)"/>
    <g>
      <rect x="736" y="670" width="344" height="12" rx="6" fill="#0e2f3a" opacity="0"/>
      <text x="752" y="680" fill="#34d399" font-size="10.5" font-weight="600">→ RetiredIndexBridge session-memory (recall)</text>
    </g>
  </g>

  <!-- ============================================================= -->
  <!-- BRAIN QUERY / MCP READ SURFACE                                -->
  <!-- ============================================================= -->
  <text x="1124" y="128" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">BRAIN QUERY · MCP read</text>
  <g>
    <rect x="1120" y="138" width="280" height="318" rx="14" fill="#111d3a" stroke="#2dd4bf" stroke-width="1.3"/>
    <rect x="1120" y="138" width="280" height="34" rx="14" fill="#15294a"/>
    <rect x="1120" y="160" width="280" height="12" fill="#15294a"/>
    <circle cx="1140" cy="155" r="5" fill="#2dd4bf"/>
    <text x="1154" y="159" fill="#7af0e0" font-size="12.5" font-weight="700">brain read surface</text>

    <g font-size="11" fill="#9fb3d1">
      <text x="1136" y="196">brain.query</text>
      <text x="1136" y="216">brain.resolve</text>
      <text x="1136" y="236">ContextPack</text>
    </g>
    <line x1="1136" y1="250" x2="1384" y2="250" stroke="#1f2d4a"/>

    <!-- canonical -->
    <g>
      <rect x="1136" y="262" width="248" height="52" rx="10" fill="#161f3d" stroke="#2dd4bf" stroke-width="1.2"/>
      <text x="1152" y="284" fill="#dbe4f3" font-size="11.5" font-weight="600">MemoryCard</text>
      <text x="1152" y="302" fill="#7af0e0" font-size="9.5">canonical · from ledger ✔</text>
    </g>
    <!-- mirror -->
    <g opacity="0.62">
      <rect x="1136" y="324" width="248" height="56" rx="10" fill="#0e1730" stroke="#475569" stroke-width="1.1" stroke-dasharray="5 4"/>
      <text x="1152" y="345" fill="#cbd5e1" font-size="11">RetiredIndexBridge native-memory</text>
      <text x="1152" y="361" fill="#cbd5e1" font-size="11">+ graph</text>
      <text x="1152" y="375" fill="#64748b" font-size="9.5">mirror · non-authoritative</text>
    </g>
    <text x="1136" y="402" fill="#5b6b8c" font-size="9.5">indexed ≠ authorized — 권위는 ledger</text>
    <line x1="1136" y1="414" x2="1384" y2="414" stroke="#1f2d4a"/>
    <text x="1136" y="436" fill="#5b6b8c" font-size="9.5">recall/product surface는 canonical만 신뢰</text>
  </g>

  <!-- ledger -> brain (authority) edge -->
  <path d="M696 552 C880 552 880 288 1134 288" fill="none" stroke="#2dd4bf" stroke-width="1.8" marker-end="url(#tflow)" opacity="0.85"/>
  <text x="900" y="372" fill="#7c8cae" font-size="10">canonical 공급 (authority)</text>

  <!-- ============================================================= -->
  <!-- GRAPH-MEMORY (off by default, dual-gated)                     -->
  <!-- ============================================================= -->
  <text x="316" y="728" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">GRAPH-MEMORY</text>
  <g opacity="0.55">
    <rect x="312" y="738" width="468" height="118" rx="14" fill="#0e1730" stroke="#475569" stroke-width="1.3" stroke-dasharray="7 6"/>
    <circle cx="336" cy="766" r="5" fill="#818cf8"/>
    <text x="350" y="770" fill="#cbd5e1" font-size="12.5" font-weight="700">Graphiti / Neo4j derived index</text>
    <g font-size="10" fill="#94a3b8">
      <text x="332" y="800">파생 인덱스 — authority = derived_index</text>
      <text x="332" y="820">ledger에서 파생 · 권위 원천 아님</text>
      <text x="332" y="840">graph-augmented recall (선택)</text>
    </g>
  </g>
  <!-- prominent OFF badge (full opacity, sits on dimmed group) -->
  <g>
    <rect x="586" y="752" width="180" height="30" rx="8" fill="#2a1410" stroke="#f97316" stroke-width="1.4"/>
    <circle cx="606" cy="767" r="5" fill="#f97316"/>
    <text x="618" y="771" fill="#fdba74" font-size="11" font-weight="700">OFF by default · dual-gated</text>
  </g>
  <!-- dashed derive edge ledger -> graph -->
  <path d="M504 688 V736" fill="none" stroke="#475569" stroke-width="1.8" stroke-dasharray="6 5" marker-end="url(#tflowDim)"/>
  <text x="514" y="716" fill="#475569" font-size="10">derive (gated)</text>

  <!-- ============================================================= -->
  <!-- GC SAFETY lane (attached to ledger/storage)                   -->
  <!-- ============================================================= -->
  <g>
    <rect x="804" y="738" width="292" height="118" rx="14" fill="#1c1410" stroke="#f97316" stroke-width="1.2" stroke-dasharray="4 4" opacity="0.85"/>
    <circle cx="828" cy="766" r="5" fill="#f97316"/>
    <text x="842" y="770" fill="#fdba74" font-size="12" font-weight="700">GC SAFETY</text>
    <g font-size="10.3" fill="#cbb89f">
      <text x="822" y="798">fail-closed GC</text>
      <text x="822" y="818">quarantine · repair</text>
    </g>
    <g>
      <rect x="906" y="788" width="172" height="30" rx="8" fill="#2a1410" stroke="#f97316" stroke-width="1.3"/>
      <circle cx="926" cy="803" r="5" fill="#fbbf24"/>
      <text x="938" y="807" fill="#fcd34d" font-size="10" font-weight="700">dry-run · approval-gated</text>
    </g>
    <text x="822" y="845" fill="#5b6b8c" font-size="9">ledger/storage에 부착 — 삭제는 승인 후</text>
  </g>
  <!-- dashed attach edge ledger -> GC -->
  <path d="M696 640 C760 640 800 720 880 736" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="6 5" opacity="0.8"/>

  <!-- ledger -> couchdb pipeline (feeds source) subtle tie -->
  <path d="M696 600 H716" fill="none" stroke="#22d3ee" stroke-width="1.6" stroke-dasharray="2 4" opacity="0.5"/>

  <!-- worker backend -> couchdb pipeline subtle tie (CouchDB write path) -->
  <path d="M1024 376 C1024 430 900 470 900 506" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.45" marker-end="url(#tflowDim)"/>

  <!-- bottom invariant strip -->
  <g>
    <rect x="1120" y="478" width="280" height="378" rx="14" fill="#0e1730" stroke="#1f2d4a"/>
    <text x="1142" y="506" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">불변 경계</text>
    <line x1="1142" y1="516" x2="1378" y2="516" stroke="#1f2d4a"/>
    <g font-size="10.3" fill="#9fb3d1">
      <text x="1142" y="544">◆ 권위는 ledger 단일 — RetiredIndexBridge ·</text>
      <text x="1158" y="560">graph는 mirror/derived</text>
      <text x="1142" y="586">◆ indexed ≠ authorized</text>
      <text x="1142" y="612">◆ delivery는 gated — shadow가</text>
      <text x="1158" y="628">기본, OPEN일 때만 write</text>
      <text x="1142" y="654">◆ graph-memory는 dual-gate</text>
      <text x="1158" y="670">통과 시에만 ON</text>
      <text x="1142" y="696">◆ GC는 dry-run 기본 · 승인 후</text>
      <text x="1158" y="712">삭제</text>
      <text x="1142" y="738">◆ out-of-repo 경계는 loopback /</text>
      <text x="1158" y="754">host.docker.internal로 추상화</text>
      <text x="1142" y="780">◆ raw id · token · private path는</text>
      <text x="1158" y="796">public output에 없음</text>
    </g>
    <line x1="1142" y1="818" x2="1378" y2="818" stroke="#1f2d4a"/>
    <text x="1142" y="840" fill="#475569" font-size="9.5">logical role labels only · privacy-safe</text>
  </g>
</svg>
