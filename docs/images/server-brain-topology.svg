  <!-- LEDGER / STATE-AUTHORITY                                      -->
  <!-- ============================================================= -->
  <text x="316" y="500" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">LEDGER · STATE-AUTHORITY</text>
  <g>
    <rect x="312" y="510" width="384" height="178" rx="14" fill="#111d3a" stroke="#818cf8" stroke-width="1.4"/>
    <rect x="312" y="510" width="384" height="34" rx="14" fill="#1a2347"/>
    <rect x="312" y="532" width="384" height="12" fill="#1a2347"/>
    <circle cx="332" cy="527" r="5" fill="#818cf8"/>
    <text x="346" y="531" fill="#c7d2fe" font-size="12.5" font-weight="700">ledger — 권위 상태표</text>

    <!-- engine seam -->
    <g>
      <rect x="328" y="556" width="166" height="64" rx="10" fill="#161f3d" stroke="#34406a"/>
      <text x="344" y="578" fill="#dbe4f3" font-size="11" font-weight="600">SQLite</text>
      <text x="344" y="596" fill="#7c8cae" font-size="9.5">code default</text>
      <text x="344" y="612" fill="#64748b" font-size="9">repo 기본 엔진</text>
    </g>
    <text x="503" y="592" fill="#475569" font-size="14" text-anchor="middle">⇄</text>
    <g opacity="0.72">
      <rect x="514" y="556" width="166" height="64" rx="10" fill="#0e1730" stroke="#475569" stroke-width="1.2" stroke-dasharray="6 5"/>
      <text x="530" y="578" fill="#cbd5e1" font-size="11" font-weight="600">PostgreSQL</text>
      <text x="530" y="596" fill="#94a3b8" font-size="9.5">live · out-of-repo</text>
      <text x="530" y="612" fill="#64748b" font-size="9">loopback</text>
    </g>

    <!-- two axes note -->
    <g font-size="10">
      <rect x="328" y="634" width="352" height="40" rx="8" fill="#0f1726"/>
      <text x="344" y="652" fill="#9fb3d1">두 축 분리 — status (수명주기)</text>
      <text x="344" y="668" fill="#9fb3d1">vs authorization_status (recall/promote 권한)</text>
    </g>
  </g>

