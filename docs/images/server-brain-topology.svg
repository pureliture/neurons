    <rect x="720" y="532" width="376" height="12" fill="#0e2f3a"/>
    <circle cx="740" cy="527" r="5" fill="#38bdf8"/>
    <text x="754" y="531" fill="#7dd3fc" font-size="12.5" font-weight="700">transcript pipeline</text>

    <g>
