      <circle cx="1000" cy="218" r="4.5" fill="#f97316"/>
      <text x="1012" y="222" fill="#fdba74" font-size="11" font-weight="700">RetiredIndexBridge</text>
      <text x="996" y="244" fill="#cbb89f" font-size="9.5">default</text>
    </g>
    <g>
      <rect x="982" y="272" width="84" height="62" rx="10" fill="#10212e" stroke="#38bdf8" stroke-width="1.2"/>
      <circle cx="1000" cy="292" r="4.5" fill="#38bdf8"/>
      <text x="1012" y="296" fill="#7dd3fc" font-size="11" font-weight="700">CouchDB</text>
      <text x="996" y="318" fill="#8fb6cc" font-size="9.5">alt</text>
    </g>
  </g>

