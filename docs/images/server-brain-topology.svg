      <text x="78" y="346" fill="#64748b" font-size="10">at-least-once</text>
    </g>
    <g>
      <rect x="60" y="366" width="196" height="48" rx="10" fill="#0e1730" stroke="#475569" stroke-width="1.1" stroke-dasharray="5 4"/>
      <text x="78" y="390" fill="#cbd5e1" font-size="11.5">POST :18080</text>
      <text x="78" y="406" fill="#64748b" font-size="10">→ ingress-api</text>
    </g>
    <text x="158" y="436" fill="#475569" font-size="10" text-anchor="middle">dendrite repo가 소유 · neurons 밖</text>
  </g>

  <!-- dashed edge dendrite -> ingress -->
  <path d="M276 390 H312" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#tflowDim)"/>

  <!-- ============================================================= -->
  <!-- INGRESS LANE                                                  -->
  <!-- ============================================================= -->
  <text x="316" y="128" fill="#5b6b8c" font-size="11" font-weight="700" letter-spacing="1.5">INGRESS LANE</text>
  <rect x="312" y="138" width="784" height="318" rx="16" fill="none" stroke="#2dd4bf" stroke-width="1.2" stroke-dasharray="3 5" opacity="0.4"/>

  <!-- ingress-api -->
  <g>
    <rect x="328" y="158" width="180" height="172" rx="13" fill="#111d3a" stroke="#2dd4bf" stroke-width="1.3"/>
    <rect x="328" y="158" width="180" height="34" rx="13" fill="#15294a"/>
    <rect x="328" y="180" width="180" height="12" fill="#15294a"/>
    <circle cx="348" cy="175" r="5" fill="#2dd4bf"/>
    <text x="362" y="179" fill="#7af0e0" font-size="12.5" font-weight="700">ingress-api</text>
    <g font-size="10.5" fill="#9fb3d1">
      <text x="344" y="216">validate</text>
      <text x="344" y="236">redact</text>
      <text x="344" y="256">idempotency</text>
