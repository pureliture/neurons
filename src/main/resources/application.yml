spring:
  application:
    name: rag-ingress-queue
  threads:
    virtual:
      enabled: true
  main:
    keep-alive: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

rag-ingress:
  nats:
    url: ${RAG_INGRESS_NATS_URL:nats://localhost:4222}
    stream: RAG_INGRESS_QUEUE
    consumer: rag_target_delivery_worker
    fetch-wait-ms: 1000
    provision-on-startup: true
  worker:
    target-profile: ${RAG_INGRESS_WORKER_TARGET_PROFILE:index-transcript-memory}
    poll-interval-ms: 1000
  target-profiles:
    index-transcript-memory:
      adapter: retired_index_bridge
      dataset-role: transcript-memory
    index-session-memory:
      adapter: retired_index_bridge
      dataset-role: session-memory
    index-session-summary:
      adapter: retired_index_bridge
      dataset-role: session-summary
    index-project-memory:
      adapter: retired_index_bridge
      dataset-role: project-memory
    index-task-summary:
      adapter: retired_index_bridge
      dataset-role: task-summary
    index-approved-memory-card:
      adapter: retired_index_bridge
      dataset-role: approved-memory-card
    index-procedural-memory:
      adapter: retired_index_bridge
      dataset-role: procedural-memory
