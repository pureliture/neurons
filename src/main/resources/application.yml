spring:
  application:
    name: rag-ingress-queue
  threads:
    virtual:
      enabled: true
  main:
    keep-alive: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

rag-ingress:
  nats:
    url: ${RAG_INGRESS_NATS_URL:nats://localhost:4222}
    stream: RAG_INGRESS_QUEUE
    consumer: rag_target_delivery_worker
    fetch-wait-ms: 1000
    provision-on-startup: true
  worker:
    target-profile: ${RAG_INGRESS_WORKER_TARGET_PROFILE:ragflow-transcript-memory}
    poll-interval-ms: 1000
  target:
    ragflow:
      delivery-enabled: ${RAGFLOW_DELIVERY_ENABLED:false}
      base-url: ${RAGFLOW_BASE_URL:}
      api-key: ${RAGFLOW_API_KEY:}
      pressure:
        running-throttle-threshold: ${RAGFLOW_PRESSURE_RUNNING_THROTTLE_THRESHOLD:20}
        unstart-throttle-threshold: ${RAGFLOW_PRESSURE_UNSTART_THROTTLE_THRESHOLD:5}
        running-closed-threshold: ${RAGFLOW_PRESSURE_RUNNING_CLOSED_THRESHOLD:100}
        unstart-closed-threshold: ${RAGFLOW_PRESSURE_UNSTART_CLOSED_THRESHOLD:25}
  target-profiles:
    ragflow-transcript-memory:
      adapter: ragflow
      dataset-role: transcript-memory
      dataset-id: ${RAGFLOW_TRANSCRIPT_MEMORY_DATASET_ID:}
    ragflow-session-memory:
      adapter: ragflow
      dataset-role: session-memory
      dataset-id: ${RAGFLOW_SESSION_MEMORY_DATASET_ID:${RAGFLOW_SESSION_SUMMARY_DATASET_ID:}}
    ragflow-session-summary:
      adapter: ragflow
      dataset-role: session-summary
      dataset-id: ${RAGFLOW_SESSION_SUMMARY_DATASET_ID:}
    ragflow-project-memory:
      adapter: ragflow
      dataset-role: project-memory
      dataset-id: ${RAGFLOW_PROJECT_MEMORY_DATASET_ID:}
    ragflow-task-summary:
      adapter: ragflow
      dataset-role: task-summary
      dataset-id: ${RAGFLOW_TASK_SUMMARY_DATASET_ID:}
    ragflow-approved-memory-card:
      adapter: ragflow
      dataset-role: approved-memory-card
      dataset-id: ${RAGFLOW_APPROVED_MEMORY_CARD_DATASET_ID:}
    ragflow-procedural-memory:
      adapter: ragflow
      dataset-role: procedural-memory
      dataset-id: ${RAGFLOW_PROCEDURAL_MEMORY_DATASET_ID:}
